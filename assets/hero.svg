<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#140828"/>
      <stop offset="60%" stop-color="#070311"/>
      <stop offset="100%" stop-color="#030107"/>
    </radialGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf0cd"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#aa7c11"/>
    </linearGradient>
    
    <!-- Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#701a75"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>

    <!-- Signal Line Gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes rotateRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulseNode {
      0%, 100% { opacity: 0.4; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    @keyframes packetFlow {
      0% { stroke-dashoffset: 60; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .rotating-ring {
      animation: rotateRing 15s infinite linear;
      transform-origin: 650px 150px;
    }
    .node-pulse {
      animation: pulseNode 3s infinite ease-in-out;
      transform-origin: center;
    }
    .packet-line {
      stroke-dasharray: 8, 12;
      animation: packetFlow 3s infinite linear;
    }
    .star {
      animation: blink 4s infinite ease-in-out;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bgGrad)"/>

  <!-- Cosmic Stars (Background) -->
  <g fill="#ffffff" fill-opacity="0.4">
    <circle cx="120" cy="40" r="1.5" class="star" style="animation-delay: 0.5s;"/>
    <circle cx="280" cy="70" r="2" class="star" style="animation-delay: 1.2s;" fill="#fdf0cd"/>
    <circle cx="340" cy="220" r="1" class="star" style="animation-delay: 2.1s;"/>
    <circle cx="80" cy="180" r="2.5" class="star" style="animation-delay: 0s;" fill="#a855f7"/>
    <circle cx="500" cy="50" r="1.5" class="star" style="animation-delay: 3s;"/>
    <circle cx="480" cy="240" r="2" class="star" style="animation-delay: 1.8s;"/>
  </g>

  <!-- Network / Orbit Grid Lines -->
  <g stroke="url(#lineGrad)" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Orbits from Central Admin Node -->
    <circle cx="650" cy="150" r="70" class="packet-line"/>
    <circle cx="650" cy="150" r="110" class="packet-line" style="animation-duration: 5s; animation-direction: reverse;"/>
    <line x1="650" y1="150" x2="480" y2="100" stroke-dasharray="5, 5" class="packet-line"/>
    <line x1="650" y1="150" x2="520" y2="210" stroke-dasharray="5, 5" class="packet-line" style="animation-duration: 4s;"/>
    <line x1="650" y1="150" x2="720" y2="70" stroke-dasharray="5, 5" class="packet-line"/>
  </g>

  <!-- Central Admin Hub -->
  <g transform="translate(650, 150)">
    <!-- Aura -->
    <circle cx="0" cy="0" r="35" fill="url(#purpleGrad)" opacity="0.4" filter="url(#glow)"/>
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" class="rotating-ring"/>
    <!-- Inner Core -->
    <circle cx="0" cy="0" r="14" fill="url(#goldGrad)"/>
    <circle cx="0" cy="0" r="6" fill="#140828"/>
  </g>

  <!-- Surrounding Client Nodes -->
  <!-- Client 1 -->
  <g transform="translate(480, 100)" class="node-pulse">
    <circle cx="0" cy="0" r="12" fill="url(#purpleGrad)" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff"/>
  </g>
  <!-- Client 2 -->
  <g transform="translate(520, 210)" class="node-pulse" style="animation-delay: 1s;">
    <circle cx="0" cy="0" r="10" fill="url(#purpleGrad)" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>
  </g>
  <!-- Client 3 -->
  <g transform="translate(720, 70)" class="node-pulse" style="animation-delay: 2s;">
    <circle cx="0" cy="0" r="10" fill="url(#purpleGrad)" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>
  </g>

  <!-- Typography / Titles -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#a855f7" letter-spacing="4" opacity="0.9">
      AUTOMATION &amp; OPTIMIZATION SUITE
    </text>
    <text x="-2" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="url(#goldGrad)" letter-spacing="1" filter="url(#glow)">
      VeyonScripts
    </text>
    <text x="0" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="300" fill="#ffffff" opacity="0.75" letter-spacing="0.5">
      Gestión Inteligente de Aulas y Despliegue WinRM
    </text>
  </g>

  <!-- Status indicators -->
  <g transform="translate(60, 240)">
    <circle cx="10" cy="10" r="5" fill="#d4af37" filter="url(#glow)" class="star"/>
    <text x="25" y="14" font-family="monospace" font-size="12" fill="#d4af37" font-weight="bold">
      SYSTEM: ACTIVE (WOL + ADMIN ELEVATION ONLINE)
    </text>
  </g>
</svg>
